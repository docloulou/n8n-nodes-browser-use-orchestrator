# Publishes this n8n community node package to npm on every version tag push,
# using npm Trusted Publishing (OIDC) — no long-lived NPM token required.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. With trusted publishing,
# provenance is generated automatically (no --provenance flag needed). It lets
# anyone cryptographically verify that a package was built by this exact
# workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# - npm CLI ≥ 11.5.1 and Node ≥ 22.14 are REQUIRED for trusted publishing.
#   This workflow pins Node 24 and upgrades npm to latest to guarantee it —
#   the npm bundled with older Node lines (10.x) would fail OIDC publishing.
# - @n8n/node-cli ≥ 0.23.0 (its `release` command runs `npm publish` with
#   provenance in CI). Check with: `npm list @n8n/node-cli`.
#
# ─── ONE-TIME SETUP (OIDC Trusted Publishing) ──────────────────────────────────
#
#   1. Log in to npmjs.com and open this package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in EXACTLY (must match this workflow):
#        Repository owner: docloulou
#        Repository name:  n8n-nodes-browser-use-orchestrator
#        Workflow name:    publish.yml
#        Environment:      (leave blank unless you use GitHub Environments)
#   4. Leave NPM_TOKEN unset — GitHub's short-lived OIDC token is used instead,
#      so no secret ever touches the repo. (A mismatch in step 3 surfaces as
#      an E404 at publish time even though the package exists.)
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# This workflow triggers on tags matching "*.*.*" (e.g. 0.2.0).
# If you prefer tags with a "v" prefix (e.g. v0.2.0), change the filter to:
#   tags: ['v*.*.*']
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run the following command locally to start an interactive release:
#
#   npm run release
#
# This will lint, build, prompt for a version bump, update the changelog,
# commit, tag, and push — which triggers this workflow to publish to npm.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc.
      # See "TAG CONVENTION" above if you prefer tags with a "v" prefix.
      - '*.*.*'
  # Permet de déclencher manuellement la publication de la version courante
  # (celle dans package.json) depuis l'onglet Actions, sans pousser de tag.
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          # Le GITHUB_TOKEN d'un repo public n'a pas accès aux repos privés.
          # On utilise un PAT (scope "repo") pour cloner le submodule privé.
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Node 24 ships a recent npm; registry-url is required so npm targets
          # npmjs.org for the OIDC trusted-publishing exchange.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Ensure npm supports trusted publishing
        # Trusted publishing (OIDC) requires npm ≥ 11.5.1. Upgrade explicitly so
        # the publish step works regardless of the npm bundled with Node.
        run: npm install -g npm@latest

      - name: Install dependencies
        # Le registre npm renvoie parfois ECONNRESET (« network aborted ») sur
        # les gros arbres de dépendances. On retente avec un backoff avant d'échouer.
        run: |
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt)"
            if npm ci; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "npm ci failed (attempt $attempt). Retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "npm ci failed after 3 attempts" >&2
          exit 1

      - name: Release
        # In CI, `npm run release` runs lint + build, then `npm publish`. With
        # `id-token: write` (above), a recent npm and a configured trusted
        # publisher, npm authenticates via OIDC and attaches provenance
        # automatically — no NPM_TOKEN, no NODE_AUTH_TOKEN.
        run: npm run release
