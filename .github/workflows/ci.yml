name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          # Le GITHUB_TOKEN d'un repo public n'a pas accès aux repos privés.
          # On utilise un PAT (scope "repo") stocké dans les secrets du repo
          # pour cloner le submodule browser-use-cdp-orchestrator (privé).
          # Créer un PAT : https://github.com/settings/tokens → "repo" → copier
          # puis Settings → Secrets and variables → Actions → New secret : SUBMODULE_PAT
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        # Le registre npm renvoie parfois ECONNRESET (« network aborted ») sur
        # les gros arbres de dépendances. On retente avec un backoff avant d'échouer.
        run: |
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt)"
            if npm ci; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "npm ci failed (attempt $attempt). Retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "npm ci failed after 3 attempts" >&2
          exit 1

      - name: Run lint
        run: 'npm run lint'

      - name: Run build
        run: 'npm run build'
